# Offline markdown link check — validates relative links + heading anchors
# (#fragments) only. External URLs are intentionally NOT checked: deterministic,
# no network, and it catches this repo's real failure mode (orphaned internal
# cross-references after a doc rename/move/delete). Used by the `check:links`
# script and the CI `links` job.
offline = true
include_fragments = "anchor-only"
# `.cursor/` holds symlinks to `.agents/`; scanning both double-checks and the
# relative links inside resolve against the wrong base.
# `docs/research/` is a staged, DO-NOT-COMMIT artifact whose agent-transcript
# citations (`[label](<uuid>)`) are chat links, not files.
# `apps/docs` — Blume MDX + site routes; gated by `docs:validate`, not lychee.
exclude_path = ["node_modules", "dist", ".cursor", "docs/research", "apps/docs"]
