name: Bug
description: Something is wrong in core — the layer lifecycle, a stack, an adapter, or a rendering surface (StackOutlet, renderStack, etc.).
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Core** means the headless engine: `LayerClient`, `LayerStack`, `Layer`, the `pending`/`queued`/`active`/`dismissed`/`error` phase lifecycle (animation is a separate `transition` axis: `entering`/`settled`/`exiting`), `loadFn`, `scope`, `gcTime`, `notifyManager`, or `layerOptions`. For a binding (`@stainless-code/<fw>-layers` — `useStack`, outlet/render surface, wrappers) use **Feature / adapter proposal** if it's a new binding, or this template if an existing one is broken.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Commands you ran, the entry point you imported, and a minimal example if possible.
      placeholder: |
        1. …
        2. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      description: Where you saw the bug.
      options:
        - Node.js
        - Bun
        - Browser (React)
        - Browser (Svelte / Vue / Solid / Preact / Angular / Lit)
        - Both / not sure
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Versions
      description: e.g. `@stainless-code/layers` version or commit, the library or framework peer you installed, Node/Bun/React version, OS.
      placeholder: layers 0.x / react 19 / bun 1.3 / macOS 14
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Logs or extra context
      description: Optional stack traces, a link to a minimal repo, or the layer phase (`pending` / `queued` / `active` / `dismissed` / `error`) and `transition` (`entering` / `settled` / `exiting`) you observed.
