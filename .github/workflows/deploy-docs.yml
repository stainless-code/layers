name: Deploy docs

# Production FTP for the unversioned /layers docs site.
# Triggers: manual, GitHub Release published (Changesets), or a PR merged to
# main that carries the `docs` label (docs-ahead of the next package release).
# Requires repo secrets: FTP_HOST, FTP_USERNAME, FTP_PASSWORD.
on:
  workflow_dispatch:
  release:
    types: [published]
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

# One production FTP root — serialize all deploys.
concurrency:
  group: deploy-docs-production
  cancel-in-progress: false

jobs:
  deploy:
    name: 🚀 Build & Deploy docs (FTP)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'docs'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          # PR merge: deploy the merge commit on main. Release / dispatch: event SHA.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
          # Full history: lastModified (sitemap <lastmod>) uses `git log` per file.
          fetch-depth: 0

      - name: Setup Bun
        uses: ./.github/actions/setup

      # Islands import published package entrypoints (`dist/`); build before Blume.
      - name: Build packages
        run: bun run build

      - name: Generate API reference (Markdown)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run docs:api

      - name: Build docs site
        env:
          # Populates the /changelog github-releases source and avoids unauthenticated
          # GitHub API rate limits in CI.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run docs:build

      # The FTP account is scoped to the /layers subfolder only, so its root IS
      # /layers — upload dist/ contents there. If the account root is the web
      # root instead, set server-dir to ./layers/.
      - name: Upload to /layers via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: strict
          local-dir: ./apps/docs/dist/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
